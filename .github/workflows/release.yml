name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            asset: recalld-x86_64-linux.tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            asset: recalld-aarch64-linux.tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            asset: recalld-aarch64-darwin.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.asset }} recalld recalld-cli
          cd ../../..

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}

  build-macos-x86:
    name: Build (x86_64-apple-darwin)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87"
          targets: x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-apple-darwin

      - name: Build
        run: cargo build --release --target x86_64-apple-darwin

      - name: Package
        run: |
          cd target/x86_64-apple-darwin/release
          tar czf ../../../recalld-x86_64-darwin.tar.gz recalld recalld-cli
          cd ../../..

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: recalld-x86_64-darwin.tar.gz

  checksums:
    name: Checksums
    needs: [build, build-macos-x86]
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --pattern "*.tar.gz" \
            --dir assets

      - name: Generate checksums
        run: |
          cd assets
          sha256sum *.tar.gz > checksums-sha256.txt

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          files: assets/checksums-sha256.txt
